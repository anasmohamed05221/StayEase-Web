    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Jakarta fonts-->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body>
    <nav class="navbar">
        <div class="container nav-inner">
            <a href="index.php" class="logo">StayEase<span>.</span></a>
            <div class="nav-links">
                <a href="index.php" class="active">Home</a>
                <a href="search-results.php">Discover</a>
                <a href="about.html">About</a>
                <a href="reviews_page.php">Reviews</a>
            </div>
            <div class="nav-auth">
                <a href="dashboard.html" class="profile-icon"><i class="fa-regular fa-circle-user"></i></a>
                <a href="login.html" class="btn-login">Login</a>
            </div>
        </div>
    </nav>

    <div class="page-content">
        <div class="form-container">
            <h2>Register</h2>
            <p class="form-subtitle">Join StayEase for effortless travel experiences.</p>
            <form action="php/auth.php" method="post">
                <label>Full Name</label>
                <div class="input-group">
                    <i class="fa-solid fa-user-pen"></i>
                    <input type="text" name="name" placeholder="Enter your full name" required>
                </div>

                <p class="field-error" id="name-error"></p>

                <label>Email Address</label>
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" name="email" placeholder="name@example.com" required>
                </div>

                <p class="field-error" id="email-error"></p>

                <label>Password</label>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="********" required>
                    <button type="button" class="toggle-password" data-target="password">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>

                <div class="strength-bar">
                    <div class="strength-segment" id="seg1"></div>
                    <div class="strength-segment" id="seg2"></div>
                    <div class="strength-segment" id="seg3"></div>
                </div>
                <p id="strength-label"></p>

                <label>Confirm Password</label>
                <div class="input-group">
                    <i class="fa-solid fa-check-double"></i>
                    <input type="password" id="confirm-password" name="confirm_password" placeholder="********"
                        required>
                    <button type="button" class="toggle-password" data-target="confirm-password">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>

                <p class="field-error" id="confirm-error"></p>

                <div id="msg"></div>

                <button type="submit">
                    Register
                    <span><i class="fa-solid fa-circle-chevron-right"></i></span>
                </button>

                <input type="hidden" name="action" value="register">

            </form>

            <div class="divider"></div>

            <div class="link">
                Already have an account?
                <a href="login.html">Login</a>
            </div>

            <div class="form-banner">
                <span>Unlock exclusive stays and member deals.</span>
            </div>
        </div>
    </div>
    <script src="js/register.js"></script>
</body>

</html>
